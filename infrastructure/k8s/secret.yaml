apiVersion: v1
kind: Secret
metadata:
  name: hollow-purple-secrets
  namespace: hollow-purple
type: Opaque
data:
  # Base64 encoded values - these should be replaced with actual secrets
  # Use: echo -n 'value' | base64
  redis-url: cmVkaXM6Ly91c2VyOnBhc3NAcmVkaXMtc2VydmljZTo2Mzc5  # redis://user:pass@redis-service:6379
  postgres-url: cG9zdGdyZXNxbDovL3VzZXI6cGFzc0Bwb3N0Z3Jlcy1zZXJ2aWNlOjU0MzIvaG9sbG93X3B1cnBsZQ==  # postgresql://user:pass@postgres-service:5432/hollow_purple
  neo4j-uri: bmVvNGovL3VzZXI6cGFzc0BuZW80ai1zZXJ2aWNlOjI2ODc=  # neo4j://user:pass@neo4j-service:2687
  openai-api-key: <BASE64_ENCODED_OPENAI_API_KEY>
  jwt-secret: <BASE64_ENCODED_JWT_SECRET>
  encryption-key: <BASE64_ENCODED_ENCRYPTION_KEY>

---
apiVersion: v1
kind: Secret
metadata:
  name: hollow-purple-tls
  namespace: hollow-purple
type: kubernetes.io/tls
data:
  tls.crt: <BASE64_ENCODED_TLS_CERTIFICATE>
  tls.key: <BASE64_ENCODED_TLS_PRIVATE_KEY>

---
apiVersion: v1
kind: Secret
metadata:
  name: hollow-purple-registry
  namespace: hollow-purple
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64_ENCODED_DOCKER_CONFIG>