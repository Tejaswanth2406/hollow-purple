apiVersion: v1
kind: Service
metadata:
  name: hollow-purple-api-service
  namespace: hollow-purple
  labels:
    app: hollow-purple-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 443
    targetPort: 8443
    protocol: TCP
    name: https
  selector:
    app: hollow-purple-api

---
apiVersion: v1
kind: Service
metadata:
  name: hollow-purple-api-loadbalancer
  namespace: hollow-purple
  labels:
    app: hollow-purple-api
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 443
    targetPort: 8443
    protocol: TCP
    name: https
  selector:
    app: hollow-purple-api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:region:account:certificate/certificate-id"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    external-dns.alpha.kubernetes.io/hostname: "api.hollow-purple.com"

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hollow-purple-api-ingress
  namespace: hollow-purple
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - api.hollow-purple.com
    secretName: hollow-purple-tls
  rules:
  - host: api.hollow-purple.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hollow-purple-api-service
            port:
              number: 80